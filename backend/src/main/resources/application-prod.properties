# ============================================================================
# PROD profile = cloud deployment (AWS RDS PostgreSQL).
# Activate with: SPRING_PROFILES_ACTIVE=prod   (or --spring.profiles.active=prod)
#
# All connection values come from environment variables so no secrets live in
# the repo. Set these on the EC2 host (see DEPLOY_AWS guide):
#   DB_URL       e.g. jdbc:postgresql://<rds-endpoint>:5432/booktowndb
#   DB_USERNAME  e.g. booktown
#   DB_PASSWORD  (from AWS Secrets Manager / your chosen RDS password)
#   FRONTEND_ORIGIN  e.g. https://dxxxx.cloudfront.net  (for CORS)
# ============================================================================

# --- Datasource (PostgreSQL via env vars) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' keeps data across restarts (RDS is persistent). Seeding is idempotent.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Disable H2 console in prod ---
spring.h2.console.enabled=false

# --- GraphQL ---
# GraphiQL kept on so the deployed API is explorable by recruiters.
# (Phase 3 will lock this down + disable introspection in prod.)
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# --- CORS: allow the CloudFront-hosted frontend to call this API cross-origin ---
# Only needed when the frontend is on a DIFFERENT origin than the API. If you put
# both behind ONE CloudFront distribution (recommended), leave FRONTEND_ORIGIN unset
# and CORS simply stays empty (same-origin requests need no CORS).
spring.graphql.cors.allowed-origins=${FRONTEND_ORIGIN:}
spring.graphql.cors.allowed-methods=GET,POST,OPTIONS
spring.graphql.cors.allowed-headers=*
