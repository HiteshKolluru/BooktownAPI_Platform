# ============================================================================
# DEFAULT profile = local development (in-memory H2).
# For cloud/RDS deployment, activate the "prod" profile instead, e.g.
#   java -jar app.jar --spring.profiles.active=prod
# or  SPRING_PROFILES_ACTIVE=prod   (see application-prod.properties)
# ============================================================================

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:booktowndb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (optional - for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# GraphQL Configuration
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# --- Security / Auth (Phase 3) ---
# Single admin identity. In prod these come from env vars (see application-prod);
# the defaults here are for LOCAL DEV ONLY.
app.security.admin-username=${ADMIN_USERNAME:admin}
app.security.admin-password=${ADMIN_PASSWORD:admin}
# HS256 secret must be >= 32 chars. Override with JWT_SECRET in prod.
app.security.jwt-secret=${JWT_SECRET:dev-only-secret-change-me-0123456789-abcdefghijklmnop}
app.security.jwt-expiration-ms=${JWT_EXPIRATION_MS:3600000}
# GraphQL query-depth limit (DoS guard)
app.graphql.max-query-depth=${GRAPHQL_MAX_DEPTH:12}
# Simple per-IP rate limit (requests per minute)
app.security.rate-limit-per-minute=${RATE_LIMIT_PER_MINUTE:120}
