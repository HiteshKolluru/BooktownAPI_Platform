<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GraphiQL</title>
    <!-- Use jsDelivr which serves correct Content-Type headers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/graphiql@1.4.7/graphiql.min.css" />
    <style>
      html, body, #graphiql { height: 100%; margin: 0; }
    </style>
  </head>
  <body>
    <div id="graphiql">Loading GraphiQL…</div>

    <!-- UMD builds of React, ReactDOM and GraphiQL from jsDelivr (compatible with GraphiQL v1.x UMD build) -->
    <script src="https://cdn.jsdelivr.net/npm/react@17/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/graphiql@1.4.7/graphiql.min.js"></script>

    <script>
      // Create a fetcher that points to the application's GraphQL endpoint
      (function() {
        var fetcher = GraphiQL.createFetcher({ url: '/graphql' });
        // Render GraphiQL
        ReactDOM.render(
          React.createElement(GraphiQL, { fetcher: fetcher }),
          document.getElementById('graphiql')
        );
      })();
    </script>
  </body>
</html>
